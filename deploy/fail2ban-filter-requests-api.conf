# -------------------------------------------------------
# Fail2ban Filter: API Brute Force — Requests v1.0
#
# Matches 401 Unauthorized responses to /api/v1/* endpoints
# in the Nginx access log (combined format).
#
# Install:
#   sudo cp deploy/fail2ban-filter-requests-api.conf /etc/fail2ban/filter.d/requests-api.conf
# -------------------------------------------------------

[Definition]
# Match lines like:
# 203.0.113.50 - - [03/Apr/2026:10:15:32 +1100] "POST /api/v1/requests HTTP/1.1" 401 ...
# 203.0.113.50 - - [03/Apr/2026:10:15:32 +1100] "GET /api/v1/requests/abc HTTP/1.1" 401 ...
failregex = ^<HOST> .* "(GET|POST|PUT|PATCH|DELETE) /api/v1/.* HTTP/[0-9.]+" 401

ignoreregex =
