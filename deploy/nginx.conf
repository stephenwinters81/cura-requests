# Nginx Configuration — Requests v1.0
# CURA Medical Specialists Imaging Request System
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/requests
#   sudo ln -s /etc/nginx/sites-available/requests /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# -------------------------------------------------------
# Rate limiting zones
# -------------------------------------------------------

# Login endpoint: 5 requests per second per IP (burst 10)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

# API endpoints: 20 requests per second per IP (burst 40)
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# -------------------------------------------------------
# HTTP — Redirect all traffic to HTTPS
# -------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name requests.curaspecialists.com.au;

    # ACME challenge for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -------------------------------------------------------
# HTTPS — Main application server block
# -------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name requests.curaspecialists.com.au;

    # ---------------------------------------------------
    # SSL / TLS Configuration (Let's Encrypt)
    # ---------------------------------------------------
    ssl_certificate /etc/letsencrypt/live/requests.curaspecialists.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/requests.curaspecialists.com.au/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/requests.curaspecialists.com.au/chain.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---------------------------------------------------
    # Security Headers (defense-in-depth, duplicates middleware)
    # ---------------------------------------------------

    # HSTS: 2 years, include subdomains, preload-ready
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;

    # XSS filter (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy — no PHI leakage via referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — disable unnecessary browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy — adjust script-src/style-src as needed for Next.js
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ---------------------------------------------------
    # Gzip Compression
    # ---------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ---------------------------------------------------
    # Request size limit (file uploads, PHI payloads)
    # ---------------------------------------------------
    client_max_body_size 10M;

    # ---------------------------------------------------
    # Rate-limited locations
    # ---------------------------------------------------

    # Login endpoint rate limiting
    location /api/auth/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API rate limiting
    location /api/v1/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------
    # Next.js static assets — long cache
    # ---------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ---------------------------------------------------
    # WebSocket support for Next.js HMR (dev only)
    # Remove or comment out in production
    # ---------------------------------------------------
    location /_next/webpack-hmr {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ---------------------------------------------------
    # Default proxy to Next.js application
    # ---------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ---------------------------------------------------
    # Deny access to hidden files (except .well-known)
    # ---------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Access and error logs
    access_log /var/log/nginx/requests-access.log;
    error_log /var/log/nginx/requests-error.log;
}
