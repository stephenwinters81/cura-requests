# -------------------------------------------------------
# AIDE Configuration — Requests v1.0
# CURA Medical Specialists Imaging Request System
#
# Advanced Intrusion Detection Environment (AIDE)
# Monitors application files for unauthorized modifications.
#
# Install:
#   sudo apt-get install aide
#   sudo cp deploy/aide.conf /etc/aide/aide.conf
#   sudo aideinit
#   sudo cp /var/lib/aide/aide.db.new /var/lib/aide/aide.db
#
# Manual check:
#   sudo aide --check --config=/etc/aide/aide.conf
#
# Update baseline after legitimate changes (e.g., deployment):
#   sudo aide --update --config=/etc/aide/aide.conf
#   sudo cp /var/lib/aide/aide.db.new /var/lib/aide/aide.db
# -------------------------------------------------------

# -------------------------------------------------------
# Database locations
# -------------------------------------------------------
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new

# -------------------------------------------------------
# Output
# -------------------------------------------------------
report_url=file:/var/log/requests/aide-check.log
report_url=stdout

# -------------------------------------------------------
# Rule definitions
# -------------------------------------------------------
# NORMAL: check permissions, ownership, size, timestamps, checksums
NORMAL = p+i+n+u+g+s+m+c+sha256

# PERMS: permissions and ownership only
PERMS = p+i+u+g

# LOG: growing log files — only check permissions (size changes expected)
LOG = p+u+g

# DIR: directory metadata
DIR = p+i+n+u+g

# -------------------------------------------------------
# Monitored paths — Application files
# -------------------------------------------------------

# Application source code and configuration
/var/www/requests/package.json NORMAL
/var/www/requests/package-lock.json NORMAL
/var/www/requests/next.config.js NORMAL
/var/www/requests/ecosystem.config.js NORMAL
/var/www/requests/tsconfig.json NORMAL
/var/www/requests/prisma NORMAL

# Server-side source code
/var/www/requests/app NORMAL
/var/www/requests/lib NORMAL
/var/www/requests/worker NORMAL
/var/www/requests/deploy NORMAL

# Environment file (detect unauthorized changes)
/var/www/requests/.env PERMS

# -------------------------------------------------------
# Monitored paths — System configuration
# -------------------------------------------------------

# Nginx configuration
/etc/nginx/sites-available/requests NORMAL
/etc/nginx/sites-enabled NORMAL
/etc/nginx/nginx.conf NORMAL

# Fail2ban configuration
/etc/fail2ban/jail.d/requests.conf NORMAL
/etc/fail2ban/filter.d/requests-api.conf NORMAL
/etc/fail2ban/filter.d/requests-login.conf NORMAL

# SSH configuration
/etc/ssh/sshd_config NORMAL

# Crontab
/var/spool/cron/crontabs PERMS

# -------------------------------------------------------
# Monitored paths — Log directory permissions
# -------------------------------------------------------
/var/log/requests DIR

# -------------------------------------------------------
# Excluded paths
# These change frequently during normal operation
# -------------------------------------------------------

# Node modules — too large, changes with npm install
!/var/www/requests/node_modules

# Next.js build output — changes on every build
!/var/www/requests/.next

# Generated PDFs — data files, not application integrity
!/var/www/requests/data/pdfs

# Temporary files
!/var/www/requests/tmp

# Git metadata
!/var/www/requests/.git
