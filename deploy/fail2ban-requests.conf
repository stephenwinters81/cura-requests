# -------------------------------------------------------
# Fail2ban Configuration — Requests v1.0
# CURA Medical Specialists Imaging Request System
#
# Install:
#   sudo cp deploy/fail2ban-requests.conf /etc/fail2ban/jail.d/requests.conf
#   sudo cp deploy/fail2ban-filter-requests-api.conf /etc/fail2ban/filter.d/requests-api.conf
#   sudo systemctl restart fail2ban
#
# Verify:
#   sudo fail2ban-client status
#   sudo fail2ban-client status requests-api
# -------------------------------------------------------

# -------------------------------------------------------
# SSH Jail (extends default sshd jail)
# Default Fail2ban already includes sshd — this overrides
# with stricter settings for a healthcare production server.
# -------------------------------------------------------
[sshd]
enabled  = true
port     = ssh
filter   = sshd
logpath  = /var/log/auth.log
maxretry = 3
findtime = 600
bantime  = 3600
# Ban for 1 hour after 3 failed attempts within 10 minutes

# -------------------------------------------------------
# Custom Jail: API Brute Force Protection
# Detects repeated 401 Unauthorized responses on /api/v1/*
# Protects API key authentication from brute force attacks.
# -------------------------------------------------------
[requests-api]
enabled  = true
port     = https
filter   = requests-api
logpath  = /var/log/nginx/requests-access.log
maxretry = 10
findtime = 300
bantime  = 1800
# Ban for 30 minutes after 10 failed API auth attempts within 5 minutes

# -------------------------------------------------------
# Custom Jail: Login Brute Force Protection
# Detects repeated 401/403 on /api/auth/* endpoints
# -------------------------------------------------------
[requests-login]
enabled  = true
port     = https
filter   = requests-login
logpath  = /var/log/nginx/requests-access.log
maxretry = 5
findtime = 300
bantime  = 3600
# Ban for 1 hour after 5 failed login attempts within 5 minutes
