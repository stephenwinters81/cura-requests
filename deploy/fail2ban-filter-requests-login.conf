# -------------------------------------------------------
# Fail2ban Filter: Login Brute Force — Requests v1.0
#
# Matches 401/403 responses to /api/auth/* endpoints
# in the Nginx access log (combined format).
#
# Install:
#   sudo cp deploy/fail2ban-filter-requests-login.conf /etc/fail2ban/filter.d/requests-login.conf
# -------------------------------------------------------

[Definition]
# Match lines like:
# 203.0.113.50 - - [03/Apr/2026:10:15:32 +1100] "POST /api/auth/callback/credentials HTTP/1.1" 401 ...
failregex = ^<HOST> .* "(GET|POST|PUT|PATCH|DELETE) /api/auth/.* HTTP/[0-9.]+" (401|403)

ignoreregex =
