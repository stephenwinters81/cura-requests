# -------------------------------------------------------
# Logrotate configuration — Requests v1.0
# CURA Medical Specialists Imaging Request System
#
# Rotates all application logs in /var/log/requests/
# Install to: /etc/logrotate.d/requests
# -------------------------------------------------------

/var/log/requests/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 www-data www-data
    sharedscripts
    postrotate
        # Signal rsyslog to reopen files after rotation
        /usr/lib/rsyslog/rsyslog-rotate 2>/dev/null || true
        # Signal PM2-managed processes if applicable
        pm2 reloadLogs 2>/dev/null || true
    endscript
}
